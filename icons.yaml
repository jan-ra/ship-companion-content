# Icon definitions for Ship Companion Content Editor
#
# Each top-level key is a group label shown as a header in the icon picker.
# Icons are listed as snake_case names matching the Flutter app's _iconMap keys.
#
# To add a new icon:
#   1. Add it under the appropriate group (or create a new group)
#   2. Run:  npm run sync-icons
#      The script validates that the icon exists in @iconify-json/material-symbols
#      and regenerates lib/material-icons.generated.ts automatically.

groups:
